<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Result Management System - Search and view your academic results">
  <meta name="theme-color" content="#0066cc">
  
  <title>{% block title %}Result Management System{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <!-- Extra CSS Block for Child Templates -->
  {% block extra_css %}{% endblock %}

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">

  <style>
    /* Quick reset for Bootstrap conflicts */
    .container {
      max-width: 1200px !important;
    }
  </style>
</head>
<body>
  <!-- Navigation (Optional - Add your navbar here) -->
  {% block navbar %}
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: var(--white); border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow-sm);">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('home.home') }}" style="font-family: 'Poppins', sans-serif; font-weight: 700; color: var(--primary-color);">
         Result Management System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </nav>
  {% endblock %}

  <!-- Main Content -->
  <main role="main">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer (Optional) -->
  {% block footer %}
    <footer style="background-color: var(--off-white); border-top: 1px solid var(--border-light); margin-top: 5rem; padding: 2rem; text-align: center; color: var(--medium-gray);">
      <div class="container">
        <p style="margin-bottom: 0.5rem;">
          &copy; 2024 Result Management System. All rights reserved.
        </p>
        <p style="margin-bottom: 0; font-size: 0.9rem;">
          <a href="#" style="color: var(--primary-color);">Privacy Policy</a> | 
          <a href="#" style="color: var(--primary-color);">Terms of Service</a>
        </p>
      </div>
    </footer>
  {% endblock %}

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Extra JS Block for Child Templates -->
  {% block extra_js %}{% endblock %}

  <!-- Global Scripts -->
  <script>
    // Prevent flash of unstyled content
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.opacity = '1';
    });

    // Add loading state to forms
    document.querySelectorAll('form').forEach(form => {
      form.addEventListener('submit', function(e) {
        const submitBtn = this.querySelector('button[type="submit"]');
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = 'Loading...';
        }
      });
    });
  </script>
</body>
</html>
